apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdss-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cdss-backend
  template:
    metadata:
      labels:
        app: cdss-backend
    spec:
      containers:
      - name: backend
        image: ecr.aws/cdss/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: cdss-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: cdss-backend
spec:
  selector:
    app: cdss-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000