apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdss-frontend
  labels:
    app: cdss-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cdss-frontend
  template:
    metadata:
      labels:
        app: cdss-frontend
    spec:
      containers:
      - name: frontend
        image: cdss-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_BASE_URL
          value: "/api"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15