apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdss-backend
  labels:
    app: cdss-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cdss-backend
  template:
    metadata:
      labels:
        app: cdss-backend
    spec:
      containers:
      - name: backend
        image: cdss-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: cdss-config
        - secretRef:
            name: cdss-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20