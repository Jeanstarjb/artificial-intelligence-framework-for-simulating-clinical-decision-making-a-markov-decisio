apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: cdss-cluster
  region: us-west-2
  version: "1.27"

managedNodeGroups:
  - name: ng-1
    instanceType: m5.large
    desiredCapacity: 3
    minSize: 1
    maxSize: 5
    volumeSize: 100
    labels:
      role: worker
    tags:
      project: cdss
    iam:
      withAddonPolicies:
        albIngress: true
        autoScaler: true